name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Quantum Runner is built from the public usecases repo and served at /quantum-runner/
      - uses: actions/checkout@v4
        with:
          repository: QAMP-62/qamposer-usecases
          path: qamposer-usecases

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build Quantum Runner
        working-directory: qamposer-usecases/quantum-runner
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Add Quantum Runner to site
        run: cp -r qamposer-usecases/quantum-runner/dist dist/quantum-runner

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
