name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Quantum Runner is built from the public usecases repo and served at /quantum-runner/
      - uses: actions/checkout@v4
        with:
          repository: QAMP-62/qamposer-usecases
          path: qamposer-usecases

      # Bloch Golf is built from the public nyainman-labs repo and served at /bloch-golf/
      - uses: actions/checkout@v4
        with:
          repository: nyainman-labs/bloch-golf
          path: bloch-golf

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Debug pnpm
        run: |
          pwd
          node -v
          pnpm -v
          cat pnpm-workspace.yaml

      - name: Install website dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build

      - name: Build Quantum Runner
        working-directory: qamposer-usecases/quantum-runner
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Add Quantum Runner to site
        run: cp -r qamposer-usecases/quantum-runner/dist dist/quantum-runner

      - name: Build Bloch Golf
        working-directory: bloch-golf
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base=./

      - name: Add Bloch Golf to site
        run: cp -r bloch-golf/dist dist/bloch-golf

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
